name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@votedforus'

      - run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build types declaration file
        run: npm run build:typesfile

      - name: Build Zod schema
        run: npm run build:schema

      - name: Typecheck source
        run: npm run test:types

      - name: Typecheck tests
        run: npm run test:types:test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Publish to GitHub Package Registry
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get published version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Checkout site repo to bump dependency
        uses: actions/checkout@v4
        with:
          repository: VotedForUs/site
          token: ${{ secrets.PERSONAL_TOKEN }}
          path: ./site

      - name: Update @votedforus/votes version in site
        run: |
          cd site
          npm pkg set dependencies["@votedforus/votes"]="${{ steps.version.outputs.version }}"

      - name: Create version bump PR in site repo
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          path: ./site
          commit-message: "chore: bump @votedforus/votes to ${{ steps.version.outputs.version }}"
          branch: chore/bump-votes-${{ steps.version.outputs.version }}
          title: "chore: bump @votedforus/votes to ${{ steps.version.outputs.version }}"
          body: |
            Published version `${{ steps.version.outputs.version }}`.
            Bumps the `@votedforus/votes` package dependency in `package.json`.
          add-paths: package.json
          labels: dependencies
