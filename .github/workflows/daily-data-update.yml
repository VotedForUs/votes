name: Daily Data Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: daily-data-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Restore API cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: congress-cache-${{ runner.os }}
          restore-keys: |
            congress-cache-${{ runner.os }}

      - name: Generate legislators
        run: npm run legislators:generate
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - name: Generate bills
        run: npm run voted-bills-sync:generate
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - name: Summarize changes
        run: npx tsx scripts/summarize-changes.ts

      - name: Save API cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: congress-cache-${{ runner.os }}

      - name: Check for content changes
        id: check-changes
        run: |
          if git diff --quiet -- content/ .github/pr-body.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: update congressional content ${{ github.run_id }}"
          branch: data/update-${{ github.run_id }}
          title: "Data update: ${{ github.run_id }}"
          body-path: .github/pr-body.md
          add-paths: |
            content/**
            .github/pr-body.md
          labels: data-update
